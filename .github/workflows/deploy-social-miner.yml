name: Deploy Social Miner to Bluehost

on:
  push:
    branches: [main]
    paths:
      - 'social-miner/**'
      - '.github/workflows/deploy-social-miner.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: social-miner-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure Bluehost SSH
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
          BLUEHOST_SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$BLUEHOST_HOST" && test -n "$BLUEHOST_USERNAME" && test -n "$BLUEHOST_SSH_PRIVATE_KEY"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$BLUEHOST_SSH_PRIVATE_KEY" > "$HOME/.ssh/bluehost_deploy"
          chmod 600 "$HOME/.ssh/bluehost_deploy"
          ssh-keyscan -p 22 -H "$BLUEHOST_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Prepare private admin config on first deploy
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail
          admin_key="$(openssl rand -hex 18)"
          admin_hash="$(php -r 'echo password_hash($argv[1], PASSWORD_DEFAULT);' "$admin_key")"
          config_b64="$(printf '%s\n' "<?php return ['admin_password_hash' => '$admin_hash'];" | base64 -w0)"
          created="$(ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            "mkdir -p public_html/social-miner/storage; chmod 700 public_html/social-miner/storage; if [ ! -f public_html/social-miner/config.local.php ]; then printf '%s' '$config_b64' | base64 -d > public_html/social-miner/config.local.php; chmod 600 public_html/social-miner/config.local.php; echo created; else echo exists; fi")"
          if [ "$created" = "created" ]; then
            echo "::notice title=Social Miner first-run admin key::$admin_key"
          else
            echo "Social Miner admin key already exists; leaving it unchanged."
          fi

      - name: Deploy Social Miner files
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail
          tar -C social-miner -czf - \
            index.php api.php webhook.php .htaccess README.md lib storage/.htaccess | \
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            'mkdir -p public_html/social-miner && tar -xzf - -C public_html/social-miner && chmod 700 public_html/social-miner/storage'

      - name: Verify live health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --retry 5 --retry-all-errors --retry-delay 3 \
            'https://madmorrigan.com/social-miner/api.php?action=health' | tee /tmp/health.json
          python3 - <<'PY'
          import json
          p=json.load(open('/tmp/health.json'))
          assert p.get('ok') is True, p
          print('Social Miner health OK:', p)
          PY
