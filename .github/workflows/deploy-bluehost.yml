name: Deploy Wet Beard to Bluehost

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wetbeard-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish madmorrigan.com/wetbeard
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out site files
        uses: actions/checkout@v4

      - name: Create deployment version marker
        shell: bash
        run: |
          deployed_at_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf '{\n  "commit_sha": "%s",\n  "deployed_at_utc": "%s",\n  "status": "deployed"\n}\n' \
            "$GITHUB_SHA" \
            "$deployed_at_utc" \
            > deploy-version.json

      - name: Configure secure Bluehost connection
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
          BLUEHOST_SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_PRIVATE_KEY }}
        run: |
          test -n "$BLUEHOST_HOST"
          test -n "$BLUEHOST_USERNAME"
          test -n "$BLUEHOST_SSH_PRIVATE_KEY"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$BLUEHOST_SSH_PRIVATE_KEY" > "$HOME/.ssh/bluehost_deploy"
          chmod 600 "$HOME/.ssh/bluehost_deploy"
          ssh-keyscan -p 22 -H "$BLUEHOST_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Confirm the production folder is safe to update
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        run: |
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 \
            "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            'test -d public_html/wetbeard && test -f public_html/wetbeard/config.php && test -f public_html/wetbeard/api/bootstrap.php'

      - name: Deploy site files without touching configuration or the database
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        run: |
          tar -czf - \
            deploy-version.json \
            index.html \
            admin.html \
            advanced.html \
            quests.html \
            riders.html \
            assets/app.js \
            assets/admin.js \
            assets/advanced.js \
            assets/quests.js \
            assets/riders.js \
            assets/style.css \
            api/api.php \
            api/admin.php \
            api/quests.php \
            api/quest-store.php \
            assets/img | \
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 \
            "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            'tar -xzf - -C public_html/wetbeard'

      - name: Verify the deployed commit
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --header 'Cache-Control: no-cache' \
            --output deploy-version-live.json \
            'https://madmorrigan.com/wetbeard/deploy-version.json'
          python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); expected=sys.argv[2]; actual=data.get("commit_sha"); status=data.get("status"); sys.exit(0 if actual == expected and status == "deployed" else f"Deploy verification failed: expected {expected}, got {actual!r}, status {status!r}")' \
            deploy-version-live.json \
            "$GITHUB_SHA"

      - name: Verify the live API still answers
        run: |
          curl --fail --silent --show-error \
            'https://madmorrigan.com/wetbeard/api/api.php?action=health' \
            > /dev/null
