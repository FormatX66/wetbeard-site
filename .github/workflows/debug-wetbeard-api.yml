name: One-time Wet Beard API Diagnostics

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/debug-wetbeard-api.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Configure Bluehost SSH
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
          BLUEHOST_SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$BLUEHOST_SSH_PRIVATE_KEY" > "$HOME/.ssh/bluehost_deploy"
          chmod 600 "$HOME/.ssh/bluehost_deploy"
          ssh-keyscan -p 22 -H "$BLUEHOST_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Collect private diagnostics without failing the run
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        shell: bash
        run: |
          set +e
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 \
            "$BLUEHOST_USERNAME@$BLUEHOST_HOST" 'bash -s' <<'REMOTE' > wetbeard-api-diagnostics.txt 2>&1
          set +e
          cd "$HOME/public_html/wetbeard" || exit 0

          echo "DIAGNOSTIC_TIME_UTC=$(date -u +%FT%TZ)"
          echo "PHP_VERSION=$(php -r 'echo PHP_VERSION;' 2>/dev/null)"
          echo

          echo '=== FILE CHECKS ==='
          for file in api/api.php api/bootstrap.php api/quest-store.php config.php; do
            if [ -f "$file" ]; then
              printf '%s\t%s\n' "$file" "present"
            else
              printf '%s\t%s\n' "$file" "missing"
            fi
          done
          echo

          echo '=== PHP LINT ==='
          php -l api/api.php
          php -l api/bootstrap.php
          php -l api/quest-store.php
          echo

          echo '=== LOCAL DATABASE BOOTSTRAP ==='
          php -d display_errors=0 -r 'require "api/bootstrap.php"; db(); echo "DB_OK\n";' 2>&1
          echo "DB_EXIT=$?"
          echo

          echo '=== LOCAL HEALTH ACTION ==='
          php -d display_errors=0 -r '$_GET["action"]="health"; require "api/api.php";' > /tmp/wetbeard-health-local.out 2> /tmp/wetbeard-health-local.err
          echo "LOCAL_HEALTH_EXIT=$?"
          echo 'LOCAL_HEALTH_STDOUT_BEGIN'
          head -c 2000 /tmp/wetbeard-health-local.out
          echo
          echo 'LOCAL_HEALTH_STDOUT_END'
          echo 'LOCAL_HEALTH_STDERR_BEGIN'
          head -c 4000 /tmp/wetbeard-health-local.err
          echo
          echo 'LOCAL_HEALTH_STDERR_END'
          echo

          echo '=== PUBLIC HEALTH REQUEST FROM BLUEHOST ==='
          curl -sS -D /tmp/wetbeard-health.headers \
            -o /tmp/wetbeard-health.body \
            -w 'HTTP_CODE=%{http_code}\n' \
            'https://madmorrigan.com/wetbeard/api/api.php?action=health'
          cat /tmp/wetbeard-health.headers
          echo 'PUBLIC_BODY_BEGIN'
          head -c 4000 /tmp/wetbeard-health.body
          echo
          echo 'PUBLIC_BODY_END'
          echo

          echo '=== RECENT PHP ERROR LINES ==='
          for log in "$HOME/logs/madmorrigan.com.php.error.log" "$HOME/public_html/error_log" "$HOME/public_html/wetbeard/error_log"; do
            if [ -f "$log" ]; then
              echo "LOG=$(basename "$log")"
              tail -n 80 "$log" | grep -Ei 'wetbeard|api\.php|bootstrap\.php|PDO|fatal|exception' | tail -n 30
            fi
          done
          REMOTE
          exit 0

      - name: Upload private diagnostic report
        uses: actions/upload-artifact@v4
        with:
          name: wetbeard-api-diagnostics
          path: wetbeard-api-diagnostics.txt
          retention-days: 1
