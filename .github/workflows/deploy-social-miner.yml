name: Deploy Social Miner to Bluehost

on:
  push:
    branches: [main]
    paths:
      - 'social-miner/**'
      - '.github/workflows/deploy-social-miner.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-miner-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure Bluehost SSH
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
          BLUEHOST_SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$BLUEHOST_HOST" && test -n "$BLUEHOST_USERNAME" && test -n "$BLUEHOST_SSH_PRIVATE_KEY"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$BLUEHOST_SSH_PRIVATE_KEY" > "$HOME/.ssh/bluehost_deploy"
          chmod 600 "$HOME/.ssh/bluehost_deploy"
          ssh-keyscan -p 22 -H "$BLUEHOST_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Establish recoverable admin login once
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
          BOOTSTRAP_ADMIN_HASH: '$2y$12$kUtc5ykorp2d.MbPgUEJgOELTZgZPNuoZ8dlaS5mm74ekNUDpwbny'
        shell: bash
        run: |
          set -euo pipefail
          config_b64="$(php -r 'echo base64_encode("<?php return " . var_export(["admin_password_hash" => $argv[1]], true) . ";\n");' "$BOOTSTRAP_ADMIN_HASH")"
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            "set -e; mkdir -p public_html/social-miner/storage; chmod 700 public_html/social-miner/storage; marker=public_html/social-miner/.admin-bootstrap-v2; if [ ! -f \"\$marker\" ]; then printf '%s' '$config_b64' | base64 -d > public_html/social-miner/config.local.php; chmod 600 public_html/social-miner/config.local.php; touch \"\$marker\"; chmod 600 \"\$marker\"; fi"

      - name: Deploy Social Miner files
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USERNAME: ${{ secrets.BLUEHOST_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail
          tar -C social-miner -czf - \
            index.php api.php webhook.php .htaccess README.md lib storage/.htaccess | \
          ssh -i "$HOME/.ssh/bluehost_deploy" -p 22 "$BLUEHOST_USERNAME@$BLUEHOST_HOST" \
            'mkdir -p public_html/social-miner && tar -xzf - -C public_html/social-miner && chmod 700 public_html/social-miner/storage'

      - name: Verify live health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --retry 5 --retry-all-errors --retry-delay 3 \
            'https://madmorrigan.com/social-miner/api.php?action=health' | tee /tmp/health.json
          python3 - <<'PY'
          import json
          p=json.load(open('/tmp/health.json'))
          assert p.get('ok') is True, p
          assert p.get('storage_writable') is True, p
          print('Social Miner health OK:', p)
          PY

      - name: Record verified deployment receipt
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          health=json.load(open('/tmp/health.json'))
          payload={
              'deployed_commit': os.environ['GITHUB_SHA'],
              'verified_at_utc': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00','Z'),
              'health': health,
              'url': 'https://madmorrigan.com/social-miner/api.php?action=health',
          }
          os.makedirs('.deploy-status', exist_ok=True)
          with open('.deploy-status/social-miner.json','w',encoding='utf-8') as f:
              json.dump(payload,f,indent=2,sort_keys=True)
              f.write('\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .deploy-status/social-miner.json
          git diff --cached --quiet && exit 0
          git commit -m 'Record Social Miner deployment [skip ci]'
          git push origin HEAD:main
